const topicColors = {logika:'#185FA5',psikologi:'#3B6D11',sains:'#854F0B',ekonomi:'#533AB7',filsafat:'#993556'};
const topicBg = {logika:'#E6F1FB',psikologi:'#EAF3DE',sains:'#FAEEDA',ekonomi:'#EEEDFE',filsafat:'#FBEAF0'};

function scoreColor(s){
  if(s>=9) return {bg:'#EAF3DE',color:'#27500A'};
  if(s>=7) return {bg:'#FAEEDA',color:'#633806'};
  return {bg:'#FCEBEB',color:'#791F1F'};
}

function avgScore(a){
  const v = Object.values(a.scores);
  return Math.round((v.reduce((s,x)=>s+x,0)/v.length)*10)/10;
}

let activeFilter = 'semua';
let sortMode = 'score-asc';

function render(){
  let data = [...articles];
  if(activeFilter!=='semua') data = data.filter(a=>a.topic===activeFilter || a.difficulty===activeFilter);
  if(sortMode==='score-asc') data.sort((a,b)=>avgScore(a)-avgScore(b));
  else if(sortMode==='score-desc') data.sort((a,b)=>avgScore(b)-avgScore(a));
  else data.sort((a,b)=>a.title.localeCompare(b.title,'id'));

  const el = document.getElementById('cards');
  if(!data.length){el.innerHTML='<div class="empty">Tidak ada artikel ditemukan.</div>';return;}
  el.innerHTML = data.map(a=>{
    const avg = avgScore(a);
    const sc = scoreColor(avg);
    const dims = Object.entries(a.scores);
    return `<div class="card">
      <div class="card-header">
        <div class="score-badge" style="background:${sc.bg};color:${sc.color}">${avg.toFixed(1)}</div>
        <div style="flex:1">
          <div class="card-title">${a.title}</div>
          <div class="card-meta" style="margin-top:4px">
            <span class="pill pill-topic" style="background:${topicBg[a.topic]||'#eee'};color:${topicColors[a.topic]||'#333'}">${a.topic}</span>
            <span class="pill pill-diff">${a.difficulty}</span>
            <span style="font-size:11px;color:var(--color-text-secondary)">${a.author}</span>
          </div>
        </div>
      </div>
      <div class="dims">${dims.map(([k,v])=>{
        const pct = (v/10)*100;
        const c = v>=9?'#639922':v>=7?'#BA7517':'#E24B4A';
        return `<div class="dim">
          <div class="dim-name">${k}</div>
          <div class="dim-bar-bg"><div class="dim-bar" style="width:${pct}%;background:${c}"></div></div>
          <div class="dim-val" style="color:${c}">${v}/10</div>
        </div>`;
      }).join('')}</div>
      <div class="issues">${a.issues.map(i=>`<div class="issue ${i.type}">${i.msg}</div>`).join('')}</div>
    </div>`;
  }).join('');
}

function renderStats(){
  const avgs = articles.map(avgScore);
  const avg = (avgs.reduce((s,x)=>s+x,0)/avgs.length).toFixed(1);
  const high = articles.filter(a=>avgScore(a)>=8.5).length;
  const needsWork = articles.filter(a=>avgScore(a)<7.5).length;
  const teams = [...new Set(articles.map(a=>a.author))].length;
  document.getElementById('stats').innerHTML = [
    {num:articles.length,label:'Total artikel'},
    {num:avg,label:'Rata-rata skor'},
    {num:high,label:'Artikel ≥ 8.5'},
    {num:needsWork,label:'Perlu perbaikan'}
  ].map(s=>`<div class="stat"><div class="stat-num">${s.num}</div><div class="stat-label">${s.label}</div></div>`).join('');
}

function renderFilters(){
  const topics = [...new Set(articles.map(a=>a.topic))];
  const diffs = [...new Set(articles.map(a=>a.difficulty))];
  const all = ['semua',...topics,...diffs];
  document.getElementById('filters').innerHTML = all.map(f=>
    `<div class="chip${f===activeFilter?' active':''}" data-f="${f}">${f}</div>`
  ).join('');
  document.querySelectorAll('.chip').forEach(c=>{
    c.addEventListener('click',()=>{activeFilter=c.dataset.f;renderFilters();render();});
  });
}

document.getElementById('sortSel').addEventListener('change',e=>{sortMode=e.target.value;render();});

renderStats();
renderFilters();
render();
</script>
